<!DOCTYPE html>
<html lang="en" data-theme="hp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City - Luciano UK</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .city-header {
      background: var(--bg-card-alt);
      padding: 24px var(--page-pad) 20px;
      border-bottom: 2px solid var(--border);
    }
    .city-header h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      margin-bottom: 4px;
    }
    .city-header .city-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <a id="back-link" href="map.html" class="back-btn"><span class="mi">arrow_back</span></a>
    <h1 id="page-title">City</h1>
    <span class="creator-badge">Creator</span>
  </header>

  <div class="city-header" id="city-header"></div>

  <h2 class="section-header">Activities</h2>
  <div id="activity-list"></div>

  <div style="height: 72px;"></div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="mi">map</span>Map</a>
    <a href="map.html"><span class="mi">list_alt</span>Itinerary</a>
    <a href="wizarding.html"><span class="mi">auto_fix_high</span>HP</a>
    <a href="backstage.html"><span class="mi">music_note</span>Beatles</a>
    <a href="paths.html"><span class="mi">fork_right</span>Paths</a>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var cityId = params.get('id');
    var from = params.get('from') || 'map';
    var cityName = CITY_NAMES[cityId];

    document.getElementById('back-link').href = from + '.html';

    if (!cityName) {
      window.location.href = 'map.html';
    } else {
      document.getElementById('page-title').textContent = cityName;
      document.title = cityName + ' - Luciano UK';

      // Find activities in this city
      var cityActivities = TRIP.activities.filter(function(a) {
        return a.location.toLowerCase().includes(cityId);
      });

      // Count days in this city for current path
      var pathId = getCurrentPath();
      var path = TRIP.paths.find(function(p) { return p.id === pathId; });
      var daysHere = path ? path.days.filter(function(d) { return d.city === cityId; }).length : 0;

      document.getElementById('city-header').innerHTML =
        '<h2>' + cityName + '</h2>' +
        '<p class="city-sub">' + daysHere + ' day' + (daysHere !== 1 ? 's' : '') + ' here on Path ' + pathId + ', ' + cityActivities.length + ' activities</p>';

      document.getElementById('activity-list').innerHTML =
        cityActivities.map(function(a) { return App.renderActivityCard(a); }).join('');
    }

    App.init();
  </script>
</body>
</html>
