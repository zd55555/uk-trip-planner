<!DOCTYPE html>
<html lang="en" data-theme="hp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Marauder's Map - Luciano UK</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fff9ee">
  <style>
    .map-hero {
      background: var(--bg-card-alt);
      padding: 24px var(--page-pad) 20px;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }
    .map-hero h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      margin-bottom: 4px;
    }
    .map-hero .map-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .path-link {
      display: block;
      text-align: center;
      padding: 10px;
      font-family: var(--font-meta);
      font-size: 0.78rem;
      color: var(--accent-strong);
      text-decoration: none;
      background: var(--bg-card-alt);
      border-bottom: 1px solid var(--border-subtle);
    }
    .path-link:active { background: var(--bg-card); }
    .city-divider {
      font-family: var(--font-display);
      font-size: 1.2rem;
      padding: 16px var(--page-pad) 8px;
      color: var(--accent-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .city-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .day-activity-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-meta);
      font-size: 0.68rem;
      color: var(--accent-strong);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 6px;
      margin-right: 4px;
      border: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body data-page="map.html">
  <header class="top-bar">
    <a href="index.html" class="back-btn"><span class="mi">arrow_back</span></a>
    <h1>The Marauder's Map</h1>
  </header>

  <div class="budget-bar" id="budget-bar"></div>

  <div class="map-hero" id="map-hero"></div>

  <a href="paths.html" class="path-link" id="path-link"></a>

  <a href="route.html" class="path-link" style="border-bottom: 1px solid var(--border-subtle);">
    <span class="mi mi-xs">map</span> View route on map
  </a>

  <div id="map-content"></div>

  <div style="height: 24px;"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function renderMap() {
      var pathId = getCurrentPath();
      var path = TRIP.paths.find(function(p) { return p.id === pathId; });
      if (!path) return;

      var hero = document.getElementById('map-hero');
      var cityRoute = path.cities.map(function(c) { return CITY_NAMES[c]; }).join(' > ');
      var dayCount = path.days.length;
      hero.innerHTML = '<h2>' + cityRoute + '</h2>' +
        '<p class="map-sub">' + path.name + ': ' + dayCount + ' days, ' + path.tagline.toLowerCase() + '</p>';

      document.getElementById('path-link').textContent =
        'Viewing Path ' + pathId + ': ' + path.name + ' (change path)';

      var content = document.getElementById('map-content');
      var html = '';
      var currentCity = '';

      path.days.forEach(function(day) {
        if (day.city !== currentCity) {
          currentCity = day.city;
          html += '<div class="city-divider">' + CITY_NAMES[day.city] + '</div>';
        }

        var hasActivities = day.activities.length > 0;
        var tagHtml = '';
        day.activities.forEach(function(aId) {
          var a = getActivity(aId);
          if (!a) return;
          var cat = CATEGORY_LABELS[a.category];
          tagHtml += '<span class="day-activity-tag"><span class="mi mi-xs">' + cat.icon + '</span> ' + a.title + '</span>';
        });

        html += '<div class="day-card ' + (hasActivities ? 'has-activities' : '') + '">' +
          '<div class="day-num">' + day.day + '</div>' +
          '<div class="day-content">' +
            '<div class="day-label">Day ' + day.day + '</div>' +
            '<div class="day-title">' + day.title + '</div>' +
            '<div class="day-desc">' + day.description + '</div>' +
            '<div class="day-activities">' + tagHtml + '</div>' +
          '</div>' +
        '</div>';
      });

      content.innerHTML = html;
    }

    App.init();
    App.renderBudgetBar();
    renderMap();
  </script>
</body>
</html>
