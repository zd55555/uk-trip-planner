<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luciano UK</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&family=EB+Garamond:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      max-width: 400px;
      width: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .hero-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 1.25rem;
      filter: brightness(0.7) contrast(1.1);
    }
    h1 {
      font-family: 'Anton', sans-serif;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #ff007a, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .portals {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .portal {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 14px;
      text-decoration: none;
      color: #f0f0f0;
      border: 1px solid #222;
      transition: transform 0.1s;
      text-align: left;
    }
    .portal:active { transform: scale(0.97); }
    .portal-icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }
    .portal-name {
      font-family: 'Anton', sans-serif;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
    }
    .portal-desc {
      font-size: 0.78rem;
      color: #888;
      display: block;
      margin-top: 2px;
    }
    .portal-map {
      background: linear-gradient(135deg, #1a1408 0%, #2a1f10 100%);
      border-color: #3d2b15;
    }
    .portal-beatles {
      background: linear-gradient(135deg, #0f0520 0%, #1a0a30 100%);
      border-color: #2d1050;
    }
    .portal-hp {
      background: linear-gradient(135deg, #0f1a08 0%, #1a2a10 100%);
      border-color: #2d4015;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="hero-img" src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800" alt="London skyline">
    <h1>Luciano UK</h1>

    <div class="portals">
      <a href="map.html" class="portal portal-map">
        <span class="portal-icon">🗺️</span>
        <span>
          <span class="portal-name">The Marauder's Map</span>
          <span class="portal-desc">The full trip, city by city, day by day</span>
        </span>
      </a>

      <a href="backstage.html" class="portal portal-beatles">
        <span class="portal-icon">🎸</span>
        <span>
          <span class="portal-name">The Backstage Pass</span>
          <span class="portal-desc">Everything Beatles</span>
        </span>
      </a>

      <a href="wizarding.html" class="portal portal-hp">
        <span class="portal-icon">⚡</span>
        <span>
          <span class="portal-name">The Wizarding World</span>
          <span class="portal-desc">Everything Harry Potter</span>
        </span>
      </a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
