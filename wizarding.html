<!DOCTYPE html>
<html lang="en" data-theme="hp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wizarding World - Luciano UK</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fff9ee">
  <style>
    .lens-hero {
      background: var(--bg-card-alt);
      padding: 28px var(--page-pad) 24px;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }
    .lens-hero .lens-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .lens-hero h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
    }
    .lens-hero .lens-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-style: italic;
    }
    .city-divider {
      font-family: var(--font-display);
      font-size: 1.2rem;
      padding: 20px var(--page-pad) 8px;
      color: var(--accent-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .city-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .path-note {
      margin: 0 var(--page-pad) 12px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-style: italic;
    }
  </style>
</head>
<body data-page="wizarding.html">
  <header class="top-bar">
    <a href="index.html" class="back-btn"><span class="mi">arrow_back</span></a>
    <h1>The Wizarding World</h1>
    <span class="creator-badge" id="creator-badge">Creator</span>
  </header>

  <div class="lens-hero">
    <div class="lens-icon">&#9889;</div>
    <h2>Everything Harry Potter</h2>
    <p class="lens-sub">I solemnly swear that I am up to no good.</p>
  </div>

  <div id="activities-list"></div>

  <div style="height: 72px;"></div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="mi">map</span>Map</a>
    <a href="map.html"><span class="mi">list_alt</span>Itinerary</a>
    <a href="wizarding.html" class="active"><span class="mi">auto_fix_high</span>HP</a>
    <a href="backstage.html"><span class="mi">music_note</span>Beatles</a>
    <a href="paths.html"><span class="mi">fork_right</span>Paths</a>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function renderHPActivities() {
      const list = document.getElementById('activities-list');
      const hp = getActivitiesByCategory('harry-potter');
      if (hp.length === 0) {
        list.innerHTML = '<div class="empty-state"><span class="mi">auto_fix_high</span>No Harry Potter activities yet.</div>';
        return;
      }

      // Group by location
      const groups = [
        { label: 'London', match: s => s.includes('London') || s.includes('Watford') || s.includes('King') || s.includes('Leavesden') },
        { label: 'Oxford', match: s => s.includes('Oxford') },
        { label: 'Alnwick', match: s => s.includes('Alnwick') }
      ];

      let html = '';
      const pathId = getCurrentPath();

      groups.forEach(g => {
        const items = hp.filter(a => g.match(a.location));
        if (items.length === 0) return;
        html += `<div class="city-divider">${g.label}</div>`;
        items.forEach(a => {
          // Note if activity is only in certain paths
          if (!a.inPaths.includes(pathId)) {
            html += `<div class="path-note">This activity is in Path ${a.inPaths.join(' & ')} only. <a href="paths.html">Compare paths</a>.</div>`;
          }
          html += App.renderActivityCard(a);
        });
      });

      list.innerHTML = html;
    }

    App.init();
    renderHPActivities();
  </script>
</body>
</html>
