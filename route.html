<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Map - Luciano UK</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0eee6">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #f0eee6;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #2c1810;
      color: #f5f0e1;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-bar a {
      color: #c4a870;
      text-decoration: none;
      display: flex;
      align-items: center;
      font-family: 'Material Symbols Outlined';
      font-size: 24px;
    }
    .top-bar h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      flex: 1;
    }
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap');

    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
      padding-top: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .map-wrap {
      position: relative;
      width: 100%;
      max-width: 800px;
    }
    .map-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* City hotspots */
    .hotspot {
      position: absolute;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 2;
      text-decoration: none;
    }
    .hotspot::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: rgba(139, 105, 20, 0.35);
      border: 2px solid rgba(139, 105, 20, 0.7);
      animation: pulse 2s ease-in-out infinite;
    }
    .hotspot:active::before {
      background: rgba(139, 105, 20, 0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }

    .hotspot .hotspot-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: #2c1810;
      white-space: nowrap;
      text-shadow: 0 0 4px #f0eee6, 0 0 4px #f0eee6, 0 0 4px #f0eee6;
      pointer-events: none;
    }

    /* Edinburgh */
    .hs-edinburgh { left: 24.7%; top: 4.6%; }
    /* Alnwick Castle */
    .hs-alnwick { left: 55.1%; top: 11.4%; }
    /* Liverpool */
    .hs-liverpool { left: 21.9%; top: 46.8%; }
    /* Oxford */
    .hs-oxford { left: 54.4%; top: 82.5%; }
    /* London */
    .hs-london { left: 71.4%; top: 84.9%; }
  </style>
</head>
<body>
  <header class="top-bar">
    <a href="map.html" class="back-btn">arrow_back</a>
    <h1>Route Map</h1>
  </header>

  <div class="map-container">
    <div class="map-wrap">
      <img src="route-map.jpg" alt="UK Route Map">
      <a href="city.html?id=edinburgh&from=route" class="hotspot hs-edinburgh" aria-label="Edinburgh">
        <span class="hotspot-label">Edinburgh</span>
      </a>
      <a href="city.html?id=alnwick&from=route" class="hotspot hs-alnwick" aria-label="Alnwick Castle">
        <span class="hotspot-label">Alnwick</span>
      </a>
      <a href="city.html?id=liverpool&from=route" class="hotspot hs-liverpool" aria-label="Liverpool">
        <span class="hotspot-label">Liverpool</span>
      </a>
      <a href="city.html?id=oxford&from=route" class="hotspot hs-oxford" aria-label="Oxford">
        <span class="hotspot-label">Oxford</span>
      </a>
      <a href="city.html?id=london&from=route" class="hotspot hs-london" aria-label="London">
        <span class="hotspot-label">London</span>
      </a>
    </div>
  </div>
</body>
</html>
