<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luciano UK</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4c28e">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #d4c28e;
    }
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .map-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .hotspot:active {
      background: rgba(196, 168, 112, 0.3);
    }
    /* Guitar + record + music notes area (bottom-left, Beatles) */
    .hotspot-beatles {
      left: 2%;
      top: 38%;
      width: 22%;
      height: 40%;
      border-radius: 20%;
    }
    /* Glasses + wand area (top-right / right side, HP) */
    .hotspot-hp {
      right: 2%;
      top: 8%;
      width: 20%;
      height: 50%;
      border-radius: 20%;
    }
    /* Lightning bolt (mid-right, also HP) */
    .hotspot-hp-bolt {
      left: 52%;
      top: 52%;
      width: 12%;
      height: 15%;
      border-radius: 40%;
    }
    /* UK land mass (center, itinerary) */
    .hotspot-map {
      left: 22%;
      top: 8%;
      width: 40%;
      height: 80%;
      border-radius: 10%;
      z-index: 0;
    }
    /* Themed hotspots sit above the land mass */
    .hotspot-beatles, .hotspot-hp, .hotspot-hp-bolt {
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <img src="map-hero.png" alt="Marauder's Map of the UK">
    <a href="map.html" class="hotspot hotspot-map" aria-label="View full itinerary"></a>
    <a href="backstage.html" class="hotspot hotspot-beatles" aria-label="Everything Beatles"></a>
    <a href="wizarding.html" class="hotspot hotspot-hp" aria-label="Everything Harry Potter"></a>
    <a href="wizarding.html" class="hotspot hotspot-hp-bolt" aria-label="Everything Harry Potter"></a>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
