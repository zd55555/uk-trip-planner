<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - UK Trip 2026</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .settings-section {
      padding: 0 var(--page-pad);
      margin-bottom: 24px;
    }
    .settings-label {
      font-family: var(--font-meta);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .setting-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .setting-row .setting-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .setting-row .setting-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .toggle {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: var(--border);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(20px); }

    .theme-options {
      display: flex;
      gap: 8px;
    }
    .theme-btn {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s;
    }
    .theme-btn:active { transform: scale(0.97); }
    .theme-btn.selected { border-color: var(--accent); }
    .theme-btn .theme-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
  </style>
</head>
<body data-page="settings.html">
  <header class="top-bar">
    <a href="cities.html" class="back-btn"><span class="mi">arrow_back</span></a>
    <h1>Settings</h1>
  </header>

  <h2 class="section-header">Preferences</h2>

  <div class="settings-section">
    <div class="settings-label">Theme</div>
    <div class="theme-options" id="theme-options">
      <button class="theme-btn" data-theme="hp" onclick="switchTheme('hp')">
        <span class="theme-icon">⚡</span>
        Marauder's Map
      </button>
      <button class="theme-btn" data-theme="beatles" onclick="switchTheme('beatles')">
        <span class="theme-icon">🎸</span>
        Backstage Pass
      </button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-label">Mode</div>
    <div class="setting-row">
      <div>
        <div class="setting-name">Creator Mode</div>
        <div class="setting-desc">Show approve/reject buttons on activities</div>
      </div>
      <button class="toggle" id="creator-toggle" onclick="toggleCreator()"></button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-label">Budget</div>
    <div class="setting-row">
      <div>
        <div class="setting-name">Total Budget</div>
        <div class="setting-desc">$1,500 for everything (flights excluded)</div>
      </div>
      <span style="font-family: var(--font-meta); font-weight: 700; color: var(--success);">$1,500</span>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-name">Estimated Spend</div>
        <div class="setting-desc">Based on current itinerary</div>
      </div>
      <span style="font-family: var(--font-meta); font-weight: 700; color: var(--success);">~$1,275</span>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function switchTheme(theme) {
      App.setTheme(theme);
      updateThemeButtons();
    }

    function toggleCreator() {
      App.toggleCreatorMode();
      updateCreatorToggle();
    }

    function updateThemeButtons() {
      const current = App.getTheme();
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.theme === current);
      });
    }

    function updateCreatorToggle() {
      const toggle = document.getElementById('creator-toggle');
      toggle.classList.toggle('on', App.isCreatorMode());
    }

    App.init();
    updateThemeButtons();
    updateCreatorToggle();
  </script>
</body>
</html>
